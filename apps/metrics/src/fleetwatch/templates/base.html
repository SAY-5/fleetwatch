<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FleetWatch{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f1115; color: #e6e8eb; }
    header { padding: 16px 24px; background: #161a22; border-bottom: 1px solid #232a36; }
    header a { color: #6ea8fe; text-decoration: none; margin-right: 16px; }
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 0; }
    h2 { font-size: 16px; border-bottom: 1px solid #232a36; padding-bottom: 6px; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0 28px; font-size: 14px; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #232a36; }
    th { color: #9aa4b2; font-weight: 600; }
    .alert { background: #2a1416; border: 1px solid #6b2330; padding: 10px 14px;
             border-radius: 6px; margin: 8px 0; }
    .ok { color: #5fd068; }
    .bad { color: #ff6b6b; }
    .cell { display: inline-block; min-width: 56px; text-align: center; padding: 4px 0;
            border-radius: 4px; color: #06110a; font-weight: 600; }
    .legend { font-size: 12px; color: #9aa4b2; }
    code { color: #c0caf5; }
  </style>
</head>
<body>
  <header>
    <h1>FleetWatch <span class="legend">detection quality over a robot fleet</span></h1>
    <nav style="margin-top:8px"><a href="/?run_id={{ run_id }}">overview</a></nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
